<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESTUPRJ352026 Telemetry Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <style>
    .vehicle-arrow-icon { background: transparent !important; border: none !important; }
    .vehicle-arrow-icon .arrow-rot { transform-origin: center center; transition: transform 0.35s ease-out; }
    .leaflet-container { font-family: ui-sans-serif, system-ui, sans-serif; border-radius: 1rem; }
    #map { width: 100%; height: 100%; min-height: 0; }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen antialiased">
  <div class="max-w-[1600px] mx-auto p-4 md:p-6 pb-10">
    <header class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-6">
      <div class="flex items-center gap-4 min-w-0">
        <div class="h-12 w-12 rounded-full bg-slate-900 flex items-center justify-center shadow-lg shrink-0">
          <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
        </div>
        <div class="min-w-0">
          <h1 class="text-xl md:text-2xl font-bold text-slate-900 tracking-tight">ESTUPRJ352026 Telemetry Control</h1>
          <p id="lastDataLine" class="text-sm text-slate-600 mt-1 font-medium tabular-nums truncate">Son veri: —</p>
        </div>
      </div>
      <div class="flex items-center gap-3 shrink-0">
        <div id="connGlyph" class="h-12 w-12 rounded-full border-2 border-slate-200 bg-white flex items-center justify-center shadow-sm text-slate-400" title="Bağlantı">
          <svg id="connGlyphSvg" class="w-7 h-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.111 16.404a5.5 5.5 0 017.778 0M12 20h.01M4.929 4.929c3.905-3.905 10.237-3.905 14.142 0M7.05 7.05a3 3 0 010 4.243m-1.415-5.658a5.5 5.5 0 010 7.778" />
          </svg>
        </div>
        <span id="connText" class="text-base md:text-lg font-semibold text-slate-800 leading-tight">Connection: Offline</span>
      </div>
    </header>

    <div id="errBanner" class="hidden mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-2 text-sm text-red-800"></div>

    <div class="grid grid-cols-1 xl:grid-cols-12 gap-4 mb-4 items-start">
      <section class="xl:col-span-7 bg-white rounded-2xl shadow-md border border-slate-200/80 p-3 md:p-4 overflow-x-auto">
        <div class="mb-3">
          <span class="text-xs font-semibold text-slate-600 uppercase tracking-wide">Harita</span>
          <span class="text-[10px] text-slate-400 ml-2">320×320 px (sabit)</span>
        </div>
        <div id="mapSquareWrap" class="relative w-[320px] h-[320px] shrink-0 overflow-hidden rounded-2xl border border-slate-200 mx-auto xl:mx-0">
          <div id="map" class="w-full h-full z-0"></div>
          <div class="absolute top-2 left-2 z-[500] pointer-events-none">
            <span class="inline-flex items-center gap-1.5 rounded-full bg-white/95 px-2.5 py-1 text-[10px] font-semibold text-slate-700 shadow border border-slate-200">
              <svg class="w-3 h-3 text-cyan-600 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/></svg>
              Canlı konum
            </span>
          </div>
          <div class="absolute bottom-2 left-2 z-[500] pointer-events-none max-w-[calc(100%-1rem)]">
            <span id="coordPill" class="inline-flex rounded-full bg-white/95 px-2.5 py-1 text-[10px] font-mono text-slate-600 shadow border border-slate-200 truncate max-w-full">— , —</span>
          </div>
        </div>
      </section>

      <aside class="xl:col-span-2 bg-white rounded-2xl shadow-md border border-slate-200/80 p-3 flex flex-col gap-2">
        <div class="flex items-center gap-2">
          <div class="h-8 w-8 rounded-lg bg-cyan-50 flex items-center justify-center text-cyan-600 shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z"/></svg>
          </div>
          <div class="min-w-0">
            <h2 class="font-bold text-slate-900 text-sm leading-tight">CSV</h2>
            <p class="text-[10px] text-slate-500">Kayıt</p>
          </div>
        </div>
        <p class="text-[11px] text-slate-600">Durum: <span id="recStatus" class="font-semibold text-slate-800">Standby</span></p>
        <button id="btnRecord" type="button" class="w-full rounded-lg bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-semibold py-2 px-2 shadow flex items-center justify-center gap-1.5 transition">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M6.3 2.841A1.5 1.5 0 004 4.11V15.89a1.5 1.5 0 002.3 1.269l9.344-5.89a1.5 1.5 0 000-2.538L6.3 2.84z"/></svg>
          Start
        </button>
        <button id="btnStopDownload" type="button" disabled class="w-full rounded-lg border border-rose-200 bg-rose-50 text-rose-400 text-xs font-semibold py-2 px-2 flex items-center justify-center gap-1.5 transition disabled:opacity-60 disabled:cursor-not-allowed enabled:hover:bg-rose-100 enabled:text-rose-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
          Stop &amp; CSV
        </button>
      </aside>

      <aside class="xl:col-span-3 bg-white rounded-2xl shadow-md border border-slate-200/80 p-4">
        <div class="flex flex-col items-center gap-3">
          <div class="relative h-28 w-28 rounded-full bg-gradient-to-br from-slate-50 to-cyan-50 border-2 border-cyan-200 flex items-center justify-center shadow-inner">
            <svg class="w-14 h-14 text-cyan-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true">
              <circle cx="12" cy="12" r="3" />
              <path d="M12 2v4M12 18v4M2 12h4M18 12h4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke-linecap="round" />
            </svg>
            <span class="absolute -bottom-1 text-[10px] font-bold tracking-wide text-cyan-800 bg-white/90 px-2 py-0.5 rounded-full border border-cyan-100">IMU</span>
          </div>
          <dl class="w-full grid grid-cols-2 gap-x-2 gap-y-1.5 text-[11px]">
            <dt class="text-slate-500">Gx</dt><dd id="imuGx" class="text-right font-mono font-semibold text-slate-800">—</dd>
            <dt class="text-slate-500">Gy</dt><dd id="imuGy" class="text-right font-mono font-semibold text-slate-800">—</dd>
            <dt class="text-slate-500">Gz</dt><dd id="imuGz" class="text-right font-mono font-semibold text-slate-800">—</dd>
            <dt class="text-slate-500">Ax</dt><dd id="imuAx" class="text-right font-mono font-semibold text-slate-800">—</dd>
            <dt class="text-slate-500">Ay</dt><dd id="imuAy" class="text-right font-mono font-semibold text-slate-800">—</dd>
            <dt class="text-slate-500">Az</dt><dd id="imuAz" class="text-right font-mono font-semibold text-slate-800">—</dd>
            <dt class="text-slate-500">Mx</dt><dd id="imuMx" class="text-right font-mono font-semibold text-slate-800">—</dd>
            <dt class="text-slate-500">My</dt><dd id="imuMy" class="text-right font-mono font-semibold text-slate-800">—</dd>
            <dt class="text-slate-500">Mz</dt><dd id="imuMz" class="text-right font-mono font-semibold text-slate-800">—</dd>
          </dl>
        </div>
      </aside>
    </div>

    <section class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-3 mb-4" id="metricGrid"></section>

    <section id="multiChartHost" class="grid grid-cols-1 md:grid-cols-2 gap-4"></section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
